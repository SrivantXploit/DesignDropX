<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignDropX — Sign In</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="grid-overlay"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-mark">DX</div>
      <h1>DesignDropX</h1>
      <p class="subtitle">No-code builder for the future</p>
      <form id="login-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">
          <span class="btn-text">Launch Builder →</span>
          <span class="btn-loader" style="display:none;"></span>
        </button>
      </form>
      <p class="hint">Enter any credentials to continue</p>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      document.querySelector('.btn-text').style.display = 'none';
      document.querySelector('.btn-loader').style.display = 'block';
      setTimeout(() => window.location.href = 'index.html', 800);
    });
  </script>
</body>
</html>
